name: WM 2026 Kalender aktualisieren

on:
  schedule:
    # Läuft täglich um 07:00 Uhr und 22:00 Uhr MESZ (= 05:00 / 20:00 UTC)
    # Während der WM auch stündlich zwischen 17–24 Uhr MESZ
    - cron: "0 5 * * *"
    - cron: "0 7 * * *"
    - cron: "0 20 * * *"
    - cron: "0 15,16,17,18,19,20,21,22 11-27 6 *"    # stündlich Gruppenphase (11.–27. Juni)
    - cron: "0 15,16,17,18,19,20,21,22 28-30 6 *"   # stündlich Runde der letzten 32 (28.–30. Juni)
    - cron: "0 15,16,17,18,19,20,21,22 1-19 7 *"    # stündlich KO-Runde bis Finale (Juli)
  workflow_dispatch:  # Manuell auslösen per Knopfdruck auf GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repo auschecken
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"

      - name: 📦 Abhängigkeiten installieren
        run: pip install requests

      - name: 🔄 Kalender aktualisieren
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python update_calendar.py

      - name: 💾 Änderungen committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add WM2026.ics
          git diff --staged --quiet || git commit -m "⚽ WM2026.ics aktualisiert $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
